# Real-Debrid API reverse proxy for Torrentio / Stremio clients.
# Template: nginx:alpine substitutes ${DEBRIDNEST_API_TOKEN} at container start.
# Mount as /etc/nginx/templates/default.conf.template (see docker-compose torrentio profile).

upstream debridnest_api {
    server debridnest:8080;
}

# Plain HTTP — http://127.0.0.1:8888/rest/1.0/
server {
    listen 8888;
    server_name _;

    client_max_body_size 100m;

    location /rest/1.0/ {
        proxy_pass http://debridnest_api/rest/1.0/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer ${DEBRIDNEST_API_TOKEN}";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /healthz {
        proxy_pass http://debridnest_api/healthz;
        proxy_set_header Host $host;
    }
}
