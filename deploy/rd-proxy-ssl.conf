# Optional HTTPS server for hosts-file override (api.real-debrid.com → 127.0.0.1).
# Requires deploy/certs/cert.pem and deploy/certs/key.pem (mkcert recommended).
# Mount alongside rd-proxy.conf, e.g.:
#   - ./deploy/rd-proxy-ssl.conf:/etc/nginx/templates/ssl.conf.template:ro
# Map host port 443 → container 443 in docker-compose.

server {
    listen 443 ssl;
    server_name api.real-debrid.com;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    client_max_body_size 100m;

    location /rest/1.0/ {
        proxy_pass http://debridnest:8080/rest/1.0/;
        proxy_http_version 1.1;
        proxy_set_header Host api.real-debrid.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Authorization "Bearer ${DEBRIDNEST_API_TOKEN}";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
