# NZBGet config fragment — merged into /config/nzbget.conf on first boot.
# Set Usenet server credentials below (NZBFinder is an indexer, not a provider).
# Eweka username/password: https://account.eweka.nl → Account → Usenet server access

MainDir=/data/files/nzb
DestDir=/data/files/nzb
InterDir=/data/files/nzb/inter
NzbDir=/data/files/nzb/nzb
QueueDir=/data/files/nzb/queue
TempDir=/data/files/nzb/tmp
ScriptDir=/data/files/nzb/scripts
LogFile=/data/files/nzb/nzbget.log
AppendCategoryDir=yes

Category1.Name=debridnest
Category1.DestDir=/data/files/nzb
Category1.Unpack=yes

Server1.Active=yes
Server1.Name=Eweka
Server1.Level=0
Server1.Group=0
Server1.Host=news.eweka.nl
Server1.Port=563
Server1.Username=CHANGE_ME
Server1.Password=CHANGE_ME
Server1.Encryption=yes
Server1.Connections=50

ControlUsername=nzbget
ControlPassword=tegbzn6789
