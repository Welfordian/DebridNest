name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build dashboard
        working-directory: web/dashboard
        run: |
          npm ci
          npm run build

      - name: Build Go binaries
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%%/*}"
            arch="${target##*/}"
            out="dist/debridnest-${os}-${arch}"
            if [ "$os" = "darwin" ]; then
              out="${out}.tar.gz"
              GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -o "debridnest-${os}-${arch}" ./cmd/debridnest
              tar czf "$out" "debridnest-${os}-${arch}"
              rm "debridnest-${os}-${arch}"
            else
              GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -o "$out" ./cmd/debridnest
            fi
          done
          ls -la dist/

      - name: Generate release notes
        run: |
          prev="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)"
          {
            echo "## Changes"
            echo
            if [ -n "$prev" ]; then
              git log "${prev}..HEAD" --pretty=format:"- %s (%h)"
            else
              git log --pretty=format:"- %s (%h)"
            fi
            echo
            echo
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for phase history."
          } > release-notes.md

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body_path: release-notes.md
          files: dist/*
