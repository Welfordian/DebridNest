name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
        working-directory: web/dashboard
      - run: npm run build
        working-directory: web/dashboard
      - run: go vet ./...
      - run: go test ./...
      - run: go build -o /dev/null ./cmd/debridnest
      - run: go build -o /dev/null ./cmd/rd-proxy

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go test -tags=integration ./test/integration/...

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build debridnest
      - run: docker compose config --quiet
      - run: docker compose --profile tls config --quiet
      - run: docker compose --profile tunnel config --quiet
      - run: docker compose --profile stremio config --quiet
      - run: docker compose --profile vpn config --quiet
      - run: docker compose --profile torrentio config --quiet
      - run: docker compose --profile transcode config --quiet

  stremio-addon:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stremio-addon
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: node --check index.js
      - run: node --check lib/debridnest.js
      - run: node --check lib/jackett.js
      - run: node --check lib/cinemeta.js
      - run: node --check lib/rank.js
      - run: node --check lib/scrapers.js
      - run: node --check lib/progress.js
      - run: node --check lib/progressHandler.js
      - run: node --check lib/quality.js
      - run: node --check lib/externalPlayer.js
      - run: node --check lib/dedupe.js
      - run: node --check lib/seasonPacks.js
