services:
  debridnest:
    build: .
    ports:
      - "8080:8080"
      - "42069:42069"
      - "42069:42069/udp"
    env_file:
      - .env
    environment:
      DEBRIDNEST_DATA_DIR: /data
      DEBRIDNEST_LISTEN: ":8080"
      DEBRIDNEST_MIN_STREAM_MB: "8"
      DEBRIDNEST_STREAM_READAHEAD_MB: "32"
      DEBRIDNEST_SEEK_READAHEAD_MB: "64"
      DEBRIDNEST_SEEK_PREROLL_MB: "8"
    volumes:
      - debridnest-data:/data
    restart: unless-stopped

  debridnest-transcode:
    profiles: ["transcode"]
    build:
      context: .
      args:
        WITH_FFMPEG: "1"
    ports:
      - "8080:8080"
      - "42069:42069"
      - "42069:42069/udp"
    env_file:
      - .env
    environment:
      DEBRIDNEST_DATA_DIR: /data
      DEBRIDNEST_LISTEN: ":8080"
      DEBRIDNEST_TRANSCODE: "1"
    volumes:
      - debridnest-data:/data
    restart: unless-stopped

  caddy:
    profiles: ["tls"]
    image: caddy:2-alpine
    depends_on:
      - debridnest
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DEBRIDNEST_DOMAIN:-localhost}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

  nginx:
    profiles: ["tls-nginx"]
    image: nginx:alpine
    depends_on:
      - debridnest
    ports:
      - "8443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - debridnest-data:/data:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    restart: unless-stopped

  cloudflared:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    depends_on:
      - debridnest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped

  jackett:
    profiles: ["stremio"]
    image: lscr.io/linuxserver/jackett:latest
    ports:
      - "9117:9117"
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ:-UTC}
    volumes:
      - jackett-config:/config
    restart: unless-stopped

  jackett-setup:
    profiles: ["stremio"]
    image: node:20-alpine
    depends_on:
      - jackett
    environment:
      JACKETT_URL: http://jackett:9117
      JACKETT_CONFIG_FILE: /jackett-config/Jackett/ServerConfig.json
      JACKETT_API_KEY: ${JACKETT_API_KEY:-}
      JACKETT_INDEXERS: ${JACKETT_INDEXERS:-limetorrents,therarbg,eztv,knaben,magnetz}
    volumes:
      - jackett-config:/jackett-config:ro
      - ./scripts/setup-jackett-indexers.js:/setup/setup-jackett-indexers.js:ro
    command: ["node", "/setup/setup-jackett-indexers.js"]
    restart: on-failure:3

  rd-proxy:
    profiles: ["torrentio"]
    image: nginx:alpine
    depends_on:
      - debridnest
    ports:
      - "8888:8888"
      # Uncomment for HTTPS hosts-file override (requires deploy/certs + rd-proxy-ssl.conf):
      # - "443:443"
    environment:
      DEBRIDNEST_API_TOKEN: ${DEBRIDNEST_API_TOKEN}
    volumes:
      - ./deploy/rd-proxy.conf:/etc/nginx/templates/default.conf.template:ro
      # Optional TLS for api.real-debrid.com hosts override:
      # - ./deploy/rd-proxy-ssl.conf:/etc/nginx/templates/ssl.conf.template:ro
      # - ./deploy/certs:/etc/nginx/certs:ro
    restart: unless-stopped

  stremio-addon:
    profiles: ["stremio"]
    build: ./stremio-addon
    ports:
      - "7001:7001"
    environment:
      DEBRIDNEST_API_URL: http://debridnest:8080/rest/1.0
      DEBRIDNEST_API_TOKEN: ${DEBRIDNEST_API_TOKEN}
      JACKETT_URL: ${JACKETT_URL:-http://jackett:9117}
      JACKETT_API_KEY: ${JACKETT_API_KEY:-}
      JACKETT_CONFIG_FILE: /jackett-config/Jackett/ServerConfig.json
      PORT: "7001"
      MAX_RESULTS: "20"
      PREFER_SDR: ${PREFER_SDR:-0}
      MAX_RESOLUTION: ${MAX_RESOLUTION:-0}
      MAX_FILE_SIZE_GB: ${MAX_FILE_SIZE_GB:-0}
      DEDUPE_STREAMS: ${DEDUPE_STREAMS:-1}
      PREFER_SEASON_PACKS: ${PREFER_SEASON_PACKS:-1}
      JACKETT_TIMEOUT_MS: ${JACKETT_TIMEOUT_MS:-12000}
      JACKETT_CACHE_TTL_MS: ${JACKETT_CACHE_TTL_MS:-600000}
      PLACEHOLDER_COUNT: ${PLACEHOLDER_COUNT:-10}
      LIST_RESOLVE_COUNT: ${LIST_RESOLVE_COUNT:-2}
      PROGRESS_MAX_WAIT_MS: "120000"
    volumes:
      - jackett-config:/jackett-config:ro
    depends_on:
      debridnest:
        condition: service_started
      jackett:
        condition: service_started
      jackett-setup:
        condition: service_completed_successfully
    restart: unless-stopped

  gluetun:
    profiles: ["vpn"]
    image: qmcgaw/gluetun:latest
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      VPN_SERVICE_PROVIDER: ${VPN_SERVICE_PROVIDER:-custom}
      VPN_TYPE: ${VPN_TYPE:-openvpn}
      OPENVPN_CUSTOM_CONFIG: ${OPENVPN_CUSTOM_CONFIG:-/gluetun/custom.conf}
      OPENVPN_USER: ${OPENVPN_USER:-}
      OPENVPN_PASSWORD: ${OPENVPN_PASSWORD:-}
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY:-}
      WIREGUARD_ADDRESSES: ${WIREGUARD_ADDRESSES:-}
      WIREGUARD_PUBLIC_KEY: ${WIREGUARD_PUBLIC_KEY:-}
      WIREGUARD_ENDPOINT_IP: ${WIREGUARD_ENDPOINT_IP:-}
      FIREWALL_OUTBOUND_SUBNETS: ${FIREWALL_OUTBOUND_SUBNETS:-}
      HEALTH_VPN_DURATION_INITIAL: 30s
    ports:
      - "8080:8080"
      - "42069:42069"
      - "42069:42069/udp"
    volumes:
      - ${OPENVPN_CONFIG_DIR:-./deploy/vpn}:/gluetun:ro
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  debridnest-vpn:
    profiles: ["vpn"]
    build: .
    network_mode: "service:gluetun"
    env_file:
      - .env
    environment:
      DEBRIDNEST_DATA_DIR: /data
      DEBRIDNEST_LISTEN: ":8080"
      DEBRIDNEST_MIN_STREAM_MB: "8"
      DEBRIDNEST_STREAM_READAHEAD_MB: "32"
      DEBRIDNEST_SEEK_READAHEAD_MB: "64"
      DEBRIDNEST_SEEK_PREROLL_MB: "8"
    volumes:
      - debridnest-data:/data
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped

volumes:
  debridnest-data:
  jackett-config:
  caddy-data:
  caddy-config:
